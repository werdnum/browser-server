name: Publish Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Custom tag for the image (defaults to timestamp)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.tags.outputs.tag }}
      should-push: ${{ steps.tags.outputs.should-push }}
      should-update: ${{ steps.tags.outputs.should-update }}
      platforms: ${{ steps.tags.outputs.platforms }}
      tags: ${{ steps.tags.outputs.tags }}
      cache-to: ${{ steps.tags.outputs.cache-to }}
    steps:
      - name: Generate tags and determine build strategy
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}"
          IS_MAIN=false
          IS_TAG=false
          SHOULD_PUSH=false
          SHOULD_UPDATE=false

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            IS_MAIN=true
            SHOULD_PUSH=true
            SHOULD_UPDATE=true
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            IS_TAG=true
            SHOULD_PUSH=true
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [ "${IS_TAG}" = "true" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG=$(date +%Y%m%d_%H%M%S)
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "should-push=${SHOULD_PUSH}" >> "$GITHUB_OUTPUT"
          echo "should-update=${SHOULD_UPDATE}" >> "$GITHUB_OUTPUT"
          echo "platforms=linux/amd64,linux/arm64" >> "$GITHUB_OUTPUT"

          {
            echo "tags<<EOF"
            echo "${IMAGE}:${TAG}"
            if [ "${IS_MAIN}" = "true" ]; then
              echo "${IMAGE}:latest"
              echo "${IMAGE}:main"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "cache-to<<EOF"
            echo "type=gha,mode=max"
            if [ "${IS_MAIN}" = "true" ]; then
              echo "type=registry,ref=${IMAGE}:cache-main,mode=max"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  build-main:
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Free up disk space
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          echo "After cleanup:"
          df -h
      - name: Checkout code
        uses: actions/checkout@v6.0.2
      - name: Set up QEMU
        if: needs.prepare.outputs.platforms != 'linux/amd64'
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Container Registry
        if: needs.prepare.outputs.should-push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set build date
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
      - name: Build and conditionally push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ needs.prepare.outputs.platforms }}
          push: ${{ needs.prepare.outputs.should-push }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: ${{ needs.prepare.outputs.tags }}
          cache-from: |
            type=gha
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}:main
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}:cache-main
          cache-to: ${{ needs.prepare.outputs.cache-to }}

      - name: Generate GitHub App token
        if: needs.prepare.outputs.should-update == 'true'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.IMAGE_UPDATER_APP_ID }}
          private-key: ${{ secrets.IMAGE_UPDATER_PRIVATE_KEY }}
          owner: werdnum
          repositories: kube-config

      - name: Update kube-config
        if: needs.prepare.outputs.should-update == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
          NEW_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}@${{ steps.build.outputs.digest }}
          STATEFULSET_PATH: kubernetes/manifests/workloads/browser-server/statefulset.yaml
        run: |
          set -e

          git clone "https://x-access-token:${GH_TOKEN}@github.com/werdnum/kube-config.git" kube-config
          cd kube-config

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          YQ_VERSION="v4.53.2"
          YQ_SHA256="d56bf5c6819e8e696340c312bd70f849dc1678a7cda9c2ad63eebd906371d56b"
          curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /tmp/yq
          echo "${YQ_SHA256}  /tmp/yq" | sha256sum --check
          sudo install -m 0755 /tmp/yq /usr/local/bin/yq

          yq eval -i "(.spec.template.spec.containers[] | select(.name == \"browser-server\") | .image) = \"${NEW_IMAGE}\"" \
            "${STATEFULSET_PATH}"

          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add "${STATEFULSET_PATH}"
            git commit -m "chore(browser-server): update image to ${IMAGE_DIGEST:0:12}

          Source: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            git pull --rebase
            git push
            echo "Updated kube-config with new image"
          fi
